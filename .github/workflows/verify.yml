name: Sniper Verification

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake python3 python3-yaml libsqlite3-dev libcurl4-openssl-dev zlib1g-dev

    - name: Bootstrap Sniper
      run: ./bootstrap.sh

    - name: Run C++ Unit Tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Run Doctor
      run: ./build/sniper doctor
