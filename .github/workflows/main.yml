name: Sniper CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libsqlite3-dev zlib1g-dev libbz2-dev wget xz-utils
        pip install rich click pytest pytest-mock pyyaml requests

    - name: Bootstrap Sniper
      run: |
        chmod +x bootstrap.sh
        # Note: In actual CI, we might want to cache the fetched dependencies
        ./bootstrap.sh

    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/python
        pytest tests/
